name: Deploy Render Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'render.yaml'
      - '.github/workflows/deploy-backend-node.yml'

permissions:
  contents: write

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, 'rollback automático') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Start local backend
        run: |
          cd backend
          cp .env.example .env
          nohup npm start > backend.log 2>&1 &
          sleep 12

      - name: Health check local
        run: |
          curl -f http://localhost:3000/api/health
          curl -f http://localhost:3000/api/meta/sources

      - name: Trigger Render deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Wait Render deploy
        run: sleep 45

      - name: Health check production
        run: curl -f "${{ secrets.RENDER_HEALTH_URL }}"

      - name: Auto rollback
        if: failure()
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git revert HEAD --no-edit
          git commit --amend -m "rollback automático backend render"
          git push
